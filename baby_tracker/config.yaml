name: Baby Tracker
version: "2026.1.0"
slug: baby_tracker
description: Track feeds, diapers, sleep, pumping and more — with an Ingress web UI, an ESP32 button remote over MQTT, and native Home Assistant entities.
url: https://github.com/hms-homelab/hms-baby-tracker
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:baby-face-outline
panel_title: Baby Tracker
hassio_api: true
homeassistant_api: true
services:
  - mqtt:need
map:
  - addon_config:rw
options:
  timezone: America/New_York
  pump_hours: 2
  notify_targets: []
  database_url: ""
schema:
  timezone: str
  pump_hours: float
  notify_targets:
    - str
  database_url: str?
