name: Baby Tracker
version: "2026.2.3"
slug: baby_tracker
description: Track feeds, diapers, sleep, pumping and more — with an Ingress web UI, an ESP32 button remote over MQTT, and native Home Assistant entities.
url: https://github.com/hms-homelab/hms-baby-tracker
# Pre-built multi-arch images on ghcr (published by .github/workflows/release.yml
# on each v* tag). Supervisor pulls ghcr.io/hms-homelab/{arch}-baby-tracker:<version>
# instead of building on-device. Bump `version` only after the matching tag's
# images exist on ghcr, or installs/updates break.
image: "ghcr.io/hms-homelab/{arch}-baby-tracker"
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:baby-face-outline
panel_title: Baby Tracker
hassio_api: true
homeassistant_api: true
services:
  - mqtt:want
map:
  - addon_config:rw
options:
  timezone: America/New_York
  pump_hours: 2
  feed_hours: 3
  notify_targets: []
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  database_url: ""
  ollama_enabled: false
  ollama_url: "http://192.168.2.5:11434"
  ollama_model: "gpt-oss:120b-cloud"
  ollama_timeout: 30
  ollama_prompt: ""
schema:
  timezone: str
  pump_hours: float
  feed_hours: float
  notify_targets:
    - str
  # MQTT broker — leave blank to auto-discover the Mosquitto add-on; set these
  # to point at an EXTERNAL broker (e.g. EMQX on another host).
  mqtt_host: str?
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  # Optional advanced override — leave blank to use the built-in SQLite store.
  database_url: str?
  # Contraction AI assessment via a local Ollama server. OFF by default — only
  # enable if you run Ollama and want an LLM labor-stage assessment when
  # contractions are logged. Writes sensor.baby_contraction_assessment[_time]
  # and (best-effort) input_text.ai_assessment[_time].
  ollama_enabled: bool
  ollama_url: str
  ollama_model: str
  ollama_timeout: int
  ollama_prompt: str?
